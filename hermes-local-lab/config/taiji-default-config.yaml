# 太极 Agent 桌面版默认非密配置。
# 本文件可以进入安装包；不要在这里写入任何敏感凭据。

model:
  provider: deepseek
  default: deepseek-v4-pro
  base_url: https://api.deepseek.com/v1

provider_credentials: []

# 仅由运维在运行目录中预批准；Provider 只能引用这里的 name。
# proxy_url 必须为无内嵌凭据的 HTTPS 地址，默认保持空列表。
trusted_proxy_profiles: []

image_gen:
  provider: openai-codex
  use_gateway: false
  model: gpt-image-2-medium

skills:
  protection:
    enabled: true
    audit_enabled: true
    protected_ids:
      - workflow-producer
      - web-article-extractor
      - style-modeler

webui:
  # 左侧主导航。true=显示，false=隐藏。
  feature_visibility:
    nav:
      chat: true
      tasks: true
      kanban: false
      writing: true
      skills: false
      memory: false
      workspaces: false
      profiles: true
      todos: false
      insights: false
      logs: false
      settings: true
    # 设置页二级菜单。true=显示，false=隐藏。
    settings_sections:
      conversation: true
      appearance: false
      preferences: false
      models: true
      providers: true
      plugins: false
      system: true
      about: true
    # 底部输入区控制条。true=显示，false=隐藏。
    composer:
      profile: false
      workspace_files: false
      workspace_switcher: false
      model: true
      reasoning: true
      toolsets: false
      quota: false
    # 聊天过程内部轨迹。true=可展开调试明细，false=只显示安全运行状态。
    chat:
      activity_details: false

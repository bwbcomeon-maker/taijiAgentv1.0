name: Pull Request CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify change
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.scope.outputs.base }}
      head: ${{ steps.scope.outputs.head }}
      risk: ${{ steps.scope.outputs.risk }}
      run_root: ${{ steps.scope.outputs.run_root }}
      run_desktop: ${{ steps.scope.outputs.run_desktop }}
      run_docx: ${{ steps.scope.outputs.run_docx }}
      run_agent: ${{ steps.scope.outputs.run_agent }}
      run_webui: ${{ steps.scope.outputs.run_webui }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - id: scope
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          base="${PR_BASE:-$BEFORE}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            base="$(git rev-parse "$HEAD_SHA^")"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          python3 scripts/classify-ci-scope.py \
            --base "$base" \
            --head "$HEAD_SHA" \
            --label "$LABELS" \
            --github-output "$GITHUB_OUTPUT"

  baseline:
    name: Baseline integrity
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Validate classifier and patch
        run: |
          python -m unittest tests.test_ci_scope_classifier
          git diff --check "${{ needs.classify.outputs.base }}...${{ needs.classify.outputs.head }}"

  root:
    name: Root contracts
    needs: classify
    if: needs.classify.outputs.run_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: hermes-local-lab/sources/hermes-agent/uv.lock
      - name: Prepare the canonical Agent venv required by root contracts
        working-directory: hermes-local-lab/sources/hermes-agent
        env:
          UV_PROJECT_ENVIRONMENT: venv
        run: uv sync --locked --extra dev --extra messaging
      - run: python -m unittest discover -s tests -p 'test_*.py'

  desktop:
    name: Desktop shell
    needs: classify
    if: needs.classify.outputs.run_desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/taiji-desktop
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/taiji-desktop/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: node --test tests/*.test.js

  docx:
    name: DOCX engine
    needs: classify
    if: needs.classify.outputs.run_docx == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-local-lab/sources/docx-engine-v2
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hermes-local-lab/sources/docx-engine-v2/package-lock.json
      - run: npm ci
      - name: Materialize locked Linux native packages for portable skill tests
        run: node scripts/materialize-portable-resvg-dependencies.js
      - run: npm test

  agent:
    name: Agent focused regression
    needs: classify
    if: needs.classify.outputs.run_agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-local-lab/sources/hermes-agent
    env:
      UV_PROJECT_ENVIRONMENT: venv
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: hermes-local-lab/sources/hermes-agent/uv.lock
      - run: uv sync --locked --extra dev --extra messaging
      - name: Run Taiji agent contracts through canonical runner
        run: |
          scripts/run_tests.sh \
            tests/tools/test_taiji_security_mode.py \
            tests/test_taiji_license.py \
            tests/gateway/test_api_server_license.py \
            tests/gateway/test_session_api.py \
            tests/tools/test_image_generation_readiness.py

  webui:
    name: WebUI focused regression
    needs: classify
    if: needs.classify.outputs.run_webui == 'true'
    runs-on: ubuntu-latest
    env:
      UV_PROJECT_ENVIRONMENT: venv
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: hermes-local-lab/sources/hermes-agent/uv.lock
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hermes-local-lab/sources/hermes-webui/package-lock.json
      - name: Prepare shared Agent Python environment
        working-directory: hermes-local-lab/sources/hermes-agent
        run: uv sync --locked --extra dev
      - name: Install WebUI dependencies into Agent environment
        working-directory: hermes-local-lab/sources/hermes-webui
        run: uv pip install --python ../hermes-agent/venv/bin/python -r requirements.txt
      - name: Install JavaScript lint dependencies
        working-directory: hermes-local-lab/sources/hermes-webui
        run: npm ci
      - name: Run WebUI runtime lint and focused regression
        working-directory: hermes-local-lab/sources/hermes-webui
        run: |
          npm run lint:runtime
          ../hermes-agent/venv/bin/python -m pytest -q \
            tests/test_brand_privacy.py \
            tests/test_model_config_api.py \
            tests/test_model_config_frontend.py \
            tests/test_approval_queue.py \
            tests/test_approval_sse.py \
            tests/test_pr1350_sse_notify_correctness.py \
            tests/test_expert_team_frontend.py \
            tests/test_ui_visibility_config.py \
            tests/test_issue1800_file_html_interactions.py \
            tests/test_writeflow_frontend.py::test_taiji_shell_breakpoint_keeps_electron_1024_in_desktop_shell \
            tests/test_issue1116_composer_placeholder.py

  ci-gate:
    name: CI Gate
    if: always()
    needs: [classify, baseline, root, desktop, docx, agent, webui]
    runs-on: ubuntu-latest
    env:
      CLASSIFY: ${{ needs.classify.result }}
      BASELINE: ${{ needs.baseline.result }}
      ROOT: ${{ needs.root.result }}
      DESKTOP: ${{ needs.desktop.result }}
      DOCX: ${{ needs.docx.result }}
      AGENT: ${{ needs.agent.result }}
      WEBUI: ${{ needs.webui.result }}
      RUN_ROOT: ${{ needs.classify.outputs.run_root }}
      RUN_DESKTOP: ${{ needs.classify.outputs.run_desktop }}
      RUN_DOCX: ${{ needs.classify.outputs.run_docx }}
      RUN_AGENT: ${{ needs.classify.outputs.run_agent }}
      RUN_WEBUI: ${{ needs.classify.outputs.run_webui }}
    steps:
      - name: Require every selected job to pass
        run: |
          python3 - <<'PY'
          import os
          required = {"CLASSIFY", "BASELINE"}
          failed = []
          for name in ("CLASSIFY", "BASELINE", "ROOT", "DESKTOP", "DOCX", "AGENT", "WEBUI"):
              result = os.environ[name]
              selected = name in required or os.environ.get(f"RUN_{name}") == "true"
              if selected and result != "success":
                  failed.append(f"{name}={result}")
          if failed:
              raise SystemExit("CI gate failed: " + ", ".join(failed))
          print("CI gate passed")
          PY
